<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Analytics Dashboard</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/css/bootstrap.min.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#f4f6f9;
font-family:Arial;
}

.dashboard-title{
text-align:center;
font-weight:bold;
margin-top:40px;
margin-bottom:40px;
}

.card{
border:none;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
padding:25px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.stat-number{
font-size:35px;
font-weight:bold;
margin-top:10px;
}

.icon{
font-size:35px;
margin-bottom:10px;
}

.users{
color:#007bff;
}

.bookings{
color:#28a745;
}

.feedback{
color:#17a2b8;
}

.items{
color:#ffc107;
}

.btn-area{
margin-top:40px;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2 class="dashboard-title">
<i class="fa fa-chart-line"></i> Admin Analytics Dashboard
</h2>

<div class="row">

<!-- TOTAL USERS -->

<div class="col-md-3">

<div class="card">

<div class="icon users">
<i class="fa fa-users"></i>
</div>

<h5>Total Users</h5>

<div class="stat-number">
{{ total_users }}
</div>

</div>

</div>

<!-- TOTAL BOOKINGS -->

<div class="col-md-3">

<div class="card">

<div class="icon bookings">
<i class="fa fa-calendar-check"></i>
</div>

<h5>Total Bookings</h5>

<div class="stat-number">
{{ total_bookings }}
</div>

</div>

</div>

<!-- TOTAL FEEDBACK -->

<div class="col-md-3">

<div class="card">

<div class="icon feedback">
<i class="fa fa-comment"></i>
</div>

<h5>Total Feedback</h5>

<div class="stat-number">
{{ total_feedback }}
</div>

</div>

</div>

<!-- TOTAL MENU ITEMS -->

<div class="col-md-3">

<div class="card">

<div class="icon items">
<i class="fa fa-utensils"></i>
</div>

<h5>Total Menu Items</h5>

<div class="stat-number">
{{ total_items }}
</div>

</div>

</div>

</div>

<div class="btn-area">

<a href="/admin/" class="btn btn-dark btn-lg">
<i class="fa fa-user-shield"></i> Admin Panel
</a>

<a href="/" class="btn btn-primary btn-lg">
<i class="fa fa-home"></i> Home
</a>

</div>

</div>

</body>

</html>
